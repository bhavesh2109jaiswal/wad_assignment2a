<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f8f9fa;
    }
    .sidebar {
      height: 100vh;
      background: #343a40;
      color: white;
      padding: 20px;
    }
    .sidebar a {
      color: white;
      display: block;
      margin: 10px 0;
      text-decoration: none;
    }
    .sidebar a:hover {
      color: #0d6efd;
    }
    .card {
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

<div class="container-fluid">
  <div class="row">
    
    <!-- Sidebar -->
    <div class="col-md-2 sidebar">
      <h4>Dashboard</h4>
      <a href="#">Home</a>
      <a href="#">Students</a>
      <a href="#">Orders</a>
      <a href="#">Exams</a>
      <a href="#">Reports</a>
      <a href="#">Settings</a>
    </div>

    <!-- Main Content -->
    <div class="col-md-10 p-4">
      <h2 class="mb-4">Admin Panel</h2>
      
      <div class="row g-4">
        <div class="col-md-3">
          <div class="card p-3 text-center">
            <h5>Total Students</h5>
            <h3>1200</h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card p-3 text-center">
            <h5>Total Orders</h5>
            <h3>850</h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card p-3 text-center">
            <h5>Exams Conducted</h5>
            <h3>45</h3>
          </div>
        </div>
        <div class="col-md-3">
          <div class="card p-3 text-center">
            <h5>Revenue</h5>
            <h3>$12K</h3>
          </div>
        </div>
      </div>

      <!-- Table Example -->
      <div class="mt-5">
        <h4>Recent Activity</h4>
        <table class="table table-striped">
          <thead>
            <tr>
              <th>Name</th>
              <th>Type</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>Rahul</td>
              <td>Student</td>
              <td>Active</td>
            </tr>
            <tr>
              <td>Anuj</td>
              <td>Order</td>
              <td>Completed</td>
            </tr>
            <tr>
              <td>Ganesh</td>
              <td>Exam</td>
              <td>Scheduled</td>
            </tr>
          </tbody>
        </table>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
